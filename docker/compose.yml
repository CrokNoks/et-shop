version: "3.8"

# =============================================================================
# Et-Shop Dev Stack
# Usage: docker compose -p etshop_<PORT_WEB> --env-file <envfile> up -d
# =============================================================================

networks:
  default:
    name: etshop_${FEATURE_NAME:-dev}
    driver: bridge

volumes:
  db_data:
    name: ${PROJECT_NAME}_db_data
  storage_data:
    name: ${PROJECT_NAME}_storage_data
  functions_data:
    name: ${PROJECT_NAME}_functions_data

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL (Supabase fork)
  # ---------------------------------------------------------------------------
  db:
    image: supabase/postgres:15.8.1.060
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${PORT_DB}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    labels:
      dev.etshop.instance: ${PROJECT_NAME}
      dev.etshop.service: db

  # ---------------------------------------------------------------------------
  # Kong API Gateway
  # ---------------------------------------------------------------------------
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT_KONG}:8000"
      - "8443:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    volumes:
      - ./volumes/kong/kong.yml:/var/lib/kong/kong.yml:ro
    labels:
      dev.etshop.instance: ${PROJECT_NAME}
      dev.etshop.service: kong

  # ---------------------------------------------------------------------------
  # GoTrue (Auth)
  # ---------------------------------------------------------------------------
  auth:
    image: supabase/gotrue:v2.170.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?search_path=auth
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ""
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-true}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
      GOTRUE_EXTERNAL_PHONE_ENABLED: "true"
      GOTRUE_SMS_AUTOCONFIRM: ${ENABLE_PHONE_AUTOCONFIRM:-true}
    labels:
      dev.etshop.instance: ${PROJECT_NAME}
      dev.etshop.service: auth

  # ---------------------------------------------------------------------------
  # PostgREST
  # ---------------------------------------------------------------------------
  rest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    command: postgrest
    labels:
      dev.etshop.instance: ${PROJECT_NAME}
      dev.etshop.service: rest

  # ---------------------------------------------------------------------------
  # Realtime
  # ---------------------------------------------------------------------------
  realtime:
    image: supabase/realtime:v2.33.72
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    command: >
      sh -c "/app/bin/migrate && /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)' && /app/bin/server"
    labels:
      dev.etshop.instance: ${PROJECT_NAME}
      dev.etshop.service: realtime

  # ---------------------------------------------------------------------------
  # Storage
  # ---------------------------------------------------------------------------
  storage:
    image: supabase/storage-api:v1.11.13
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: ${STORAGE_BACKEND}
      FILE_STORAGE_BACKEND_PATH: ${FILE_STORAGE_BACKEND_PATH}
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - storage_data:/var/lib/storage
    labels:
      dev.etshop.instance: ${PROJECT_NAME}
      dev.etshop.service: storage

  # ---------------------------------------------------------------------------
  # ImgProxy
  # ---------------------------------------------------------------------------
  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: ${IMGPROXY_ENABLE_WEBP_DETECTION}
    labels:
      dev.etshop.instance: ${PROJECT_NAME}
      dev.etshop.service: imgproxy

  # ---------------------------------------------------------------------------
  # Meta (Supabase meta API for Studio)
  # ---------------------------------------------------------------------------
  meta:
    image: supabase/postgres-meta:v0.84.2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB}
      PG_META_DB_USER: ${POSTGRES_USER}
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    labels:
      dev.etshop.instance: ${PROJECT_NAME}
      dev.etshop.service: meta

  # ---------------------------------------------------------------------------
  # Supabase Studio
  # ---------------------------------------------------------------------------
  studio:
    image: supabase/studio:20240729-ce42139
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
    ports:
      - "${PORT_STUDIO}:3000"
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      LOGFLARE_API_KEY: your-super-secret-and-long-logflare-key
      LOGFLARE_URL: http://analytics:4000
      NEXT_PUBLIC_ENABLE_LOGS: "false"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    labels:
      dev.etshop.instance: ${PROJECT_NAME}
      dev.etshop.service: studio

  # ---------------------------------------------------------------------------
  # Inbucket (local email testing)
  # ---------------------------------------------------------------------------
  inbucket:
    image: inbucket/inbucket:3.0.3
    restart: unless-stopped
    ports:
      - "${PORT_INBUCKET}:9000"
    labels:
      dev.etshop.instance: ${PROJECT_NAME}
      dev.etshop.service: inbucket

  # ---------------------------------------------------------------------------
  # Edge Runtime (Supabase Functions)
  # ---------------------------------------------------------------------------
  edge-runtime:
    image: supabase/edge-runtime:v1.67.4
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      VERIFY_JWT: "false"
    volumes:
      - functions_data:/home/deno/functions:rw
    command:
      - start
      - --main-service
      - /home/deno/functions/main
    labels:
      dev.etshop.instance: ${PROJECT_NAME}
      dev.etshop.service: edge-runtime

  # ---------------------------------------------------------------------------
  # Web (Frontend — Next.js)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "${PORT_WEB}:3000"
    volumes:
      - ../apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:${PORT_KONG}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      PORT: 3000
    depends_on:
      kong:
        condition: service_started
    labels:
      dev.etshop.instance: ${PROJECT_NAME}
      dev.etshop.service: web

  # ---------------------------------------------------------------------------
  # API (Backend — NestJS)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "${PORT_API}:3001"
    volumes:
      - ../apps/api:/app
      - /app/node_modules
      - /app/dist
    environment:
      NODE_ENV: development
      PORT: 3001
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
    labels:
      dev.etshop.instance: ${PROJECT_NAME}
      dev.etshop.service: api
